name = "plain-dew-5810xuanche-api"
main = "worker.js"
keep_vars = true
compatibility_date = "2026-07-19"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
NOTION_VERSION = "2022-06-28"
NOTION_MIN_REQUEST_INTERVAL_MS = "400"
HOME_PAGE_ID = "5f4c8de4a4c246478a4658d1ebc2a1a2"
NOTION_HOME_PAGE_ID = "5f4c8de4a4c246478a4658d1ebc2a1a2"
GITHUB_BRANCH = "main"
GITHUB_OWNER = "amber0983310929-coder"
GITHUB_REPO = "xuanche-notion-mcp"
CACHE_TTL_SECONDS = "300"
PROTECT_READS = "true"

# Secrets are configured with `wrangler secret put` and never committed:
# NOTION_TOKEN, GITHUB_TOKEN, XUANCHE_API_KEY
# Optional KV binding name: XUANCHE_CACHE

[[kv_namespaces]]
binding = "XUANCHE_CACHE"
id = "2a1fc809e225428a929517fd46e6bcfa"

[[workflows]]
name = "xuanche-world-archive-reset"
binding = "WORLD_RESET_WORKFLOW"
class_name = "WorldArchiveResetWorkflow"

[[durable_objects.bindings]]
name = "WORLD_TURN_COORDINATOR"
class_name = "WorldTurnCoordinator"

[[durable_objects.bindings]]
name = "WORLD_ARCHIVE_STEP_EXECUTOR"
class_name = "WorldArchiveStepExecutor"

[[migrations]]
tag = "v0.6.0"
new_sqlite_classes = ["WorldTurnCoordinator"]

[[migrations]]
tag = "v0.6.1"
new_sqlite_classes = ["WorldArchiveStepExecutor"]
